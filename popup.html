<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Snwitch Settings</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #18181b;
      color: #efeff1;
      margin: 0;
    }
    
    h1 {
      font-size: 18px;
      margin: 0 0 16px 0;
      color: #9147ff;
    }
    
    .setting {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
    }
    
    input[type="checkbox"] {
      margin-right: 8px;
      cursor: pointer;
    }
    
    input[type="color"] {
      width: 100%;
      height: 36px;
      border: 1px solid #464649;
      border-radius: 4px;
      background-color: #0e0e10;
      cursor: pointer;
    }
    
    button {
      width: 100%;
      padding: 10px;
      background-color: #9147ff;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    button:hover {
      background-color: #772ce8;
    }
    
    .info {
      font-size: 12px;
      color: #adadb8;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #464649;
    }
    
    .checkbox-container {
      display: flex;
      align-items: center;
      cursor: pointer;
    }
    
    .checkbox-container label {
      margin-bottom: 0;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>🔨 Snwitch Settings</h1>
  
  <div class="setting">
    <div class="checkbox-container">
      <input type="checkbox" id="enabled" checked>
      <label for="enabled">Enable highlighting</label>
    </div>
  </div>
  
  <div class="setting">
    <div class="checkbox-container">
      <input type="checkbox" id="showBadge" checked>
      <label for="showBadge">Show moderator badge</label>
    </div>
  </div>
  
  <div class="setting">
    <label for="highlightColor">Highlight color:</label>
    <input type="color" id="highlightColor" value="#9147ff">
  </div>
  
  <button id="save">Save Settings</button>
  
  <div class="info">
    Snwitch highlights Twitch chat users who moderate for other streamers.
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
